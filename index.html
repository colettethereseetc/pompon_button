<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sound Board</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: sans-serif;
            overscroll-behavior: none;
            touch-action: none;
        }
        button {
            flex: 1;
            width: 100%;
            border: none;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: filter 0.1s;
        }
        button:active {
            filter: brightness(0.9);
        }
    </style>
</head>
<body>
    <button style="background-color: #3498db;" onclick="playSound('jingle.mp3')">Jingle</button>
    <button style="background-color: #2ecc71;" onclick="playSound('viser_short.mp3')">Correct</button>
    <button style="background-color: #e74c3c;" onclick="playSound('wrong.mp3')">Incorrect</button>
    <button style="background-color: #f1c40f;" onclick="playSound('horns.mp3')">Perdu</button>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const buffers = {};
        const loadingPromises = {};

        async function getBuffer(url) {
            if (buffers[url]) return buffers[url];
            if (loadingPromises[url]) return loadingPromises[url];

            loadingPromises[url] = fetch(url)
                .then(response => response.arrayBuffer())
                .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
                .then(audioBuffer => {
                    buffers[url] = audioBuffer;
                    return audioBuffer;
                });
            
            return loadingPromises[url];
        }

        async function playSound(url) {
            // Resume context on first interaction
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            try {
                const buffer = await getBuffer(url);
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                source.start(0);
            } catch (err) {
                console.error("Error playing sound:", err);
            }
        }

        // Start preloading immediately in the background
        ['jingle.mp3', 'viser_short.mp3', 'wrong.mp3', 'horns.mp3'].forEach(url => getBuffer(url));
    </script>
</body>
</html>
